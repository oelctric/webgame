<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Geo Command Persistence Smoke Harness</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; background: #111826; color: #e6edf3; }
      h1 { margin-bottom: 8px; }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
      button { padding: 8px 12px; cursor: pointer; }
      .fixture-list { border: 1px solid #2d3748; border-radius: 6px; padding: 8px; margin-bottom: 12px; background: #0d1320; }
      .fixture-item { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid #1f2a3d; }
      .fixture-item:last-child { border-bottom: none; }
      .result-pass { color: #7ee787; }
      .result-partial { color: #f2cc60; }
      .result-fail { color: #ff7b72; }
      pre { background: #0b1020; border: 1px solid #223; border-radius: 6px; padding: 10px; overflow: auto; }
      iframe { width: 100%; height: 260px; border: 1px solid #2d3748; background: #fff; }
      small { color: #9da7b3; }
    </style>
  </head>
  <body>
    <h1>Persistence Smoke Restore Harness</h1>
    <p>Runs versioned fixtures through the real migrate → normalize → validate + runtime restore path using an embedded game runtime.</p>

    <div class="row">
      <button id="bootRuntimeBtn">Boot Runtime</button>
      <button id="runAllBtn">Run All Fixtures</button>
      <span id="runtimeStatus">Runtime: not started.</span>
    </div>

    <div class="fixture-list" id="fixtureList"></div>

    <h3>Smoke Output</h3>
    <pre id="output">No tests run yet.</pre>

    <iframe id="runtimeFrame" src="../index.html" title="Geo Command Runtime"></iframe>

    <script src="./persistence-smoke.js"></script>
  </body>
</html>
