<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geo Command Persistence Smoke</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .pass { color: #0a7f35; }
    .partial_pass { color: #9a6700; }
    .fail { color: #b42318; }
    pre { background: #f6f8fa; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Persistence Smoke Harness</h1>
  <p>Runs fixture migration/validation/runtime classification checks in-browser.</p>
  <button id="runBtn">Run Smoke</button>
  <div id="summary"></div>
  <table>
    <thead>
      <tr>
        <th>Fixture</th><th>Expected</th><th>Actual</th><th>Migration</th><th>Validation</th><th>Runtime</th><th>Skipped</th><th>Error</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  <h2>JSON</h2>
  <pre id="jsonOutput"></pre>
  <script src="./persistence-smoke.js"></script>
</body>
</html>
